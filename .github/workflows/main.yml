name: React App Deploment CI-CD
on:
  push:
    branches:
      - main
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME_DOCKER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.USERNAME_DOCKER }}/curd-image:latest .

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.USERNAME_DOCKER }}/curd-image:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy using SSM
        run: |
          aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "curd app deployment" \
          --parameters commands='[
            "docker pull ${{ secrets.USERNAME_DOCKER }}/curd-image:latest",
            "docker run -d -p 80:80 --name curd-image ${{ secrets.USERNAME_DOCKER }}/curd-image:latest"
          ]' \
          --region ${{ secrets.AWS_REGION }}
